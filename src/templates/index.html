<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema IoT - Home</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 50px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 90%;
        }
        h1 { font-size: 3rem; margin-bottom: 10px; }
        p { font-size: 1.1rem; margin-bottom: 40px; opacity: 0.9; }
        .btn-group { display: flex; flex-direction: column; gap: 15px; }
        .btn {
            padding: 15px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            transition: all 0.3s;
        }
        .btn-login { background-color: white; color: #764ba2; }
        .btn-login:hover { background-color: #f0f0f0; transform: translateY(-3px); }
        .btn-register { border: 2px solid white; color: white; }
        .btn-register:hover { background: rgba(255,255,255,0.2); transform: translateY(-3px); }
    </style>
</head>
<body>
    <div class="container">
        <h1>IoT Portal</h1>
        <p>Gerencie seus dispositivos e tarefas com segurança e performance.</p>
        
        <div class="btn-group">
            <a href="/auth/login-page" class="btn btn-login">Acessar Minha Conta</a>
            <a href="/auth/register-page" class="btn btn-register">Criar Nova Conta</a>
        </div>
    </div>
</body>
</html>
