<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso - Sistema IoT</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body {
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card {
            background: white; padding: 40px; border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 400px;
        }
        h3 { text-align: center; color: #333; margin-bottom: 25px; font-size: 24px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; color: #666; font-weight: 600; }
        .input-group input {
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px;
        }
        .btn {
            width: 100%; padding: 14px; background: #764ba2; color: white; border: none;
            border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn:hover { background: #5a3682; transform: translateY(-2px); }
        .alert {
            padding: 12px; background: #f8d7da; color: #721c24; border-radius: 8px;
            margin-bottom: 20px; font-size: 14px; display: none;
        }
        .link { display: block; text-align: center; margin-top: 20px; color: #667eea; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Acesso ao Portal</h3>
        <div id="alert" class="alert"></div>
        <form id="login-form">
            <div class="input-group">
                <label>Usuário</label>
                <input type="text" id="username" required>
            </div>
            <div class="input-group">
                <label>Senha</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn">Entrar</button>
        </form>
        <a href="/auth/register-page" class="link">Não tem conta? Cadastre-se</a>
    </div>

    <script>
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const alertDiv = document.getElementById('alert');
            const response = await fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                })
            });
            const data = await response.json();
            if (response.ok) {
                localStorage.setItem('access_token', data.access_token);
                window.location.href = '/dashboard';
            } else {
                alertDiv.innerText = data.error || 'Erro ao entrar';
                alertDiv.style.display = 'block';
            }
        };
    </script>
</body>
</html>
