<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Sistema IoT</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body {
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card {
            background: white; padding: 40px; border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 400px;
        }
        h3 { text-align: center; color: #333; margin-bottom: 25px; font-size: 24px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; color: #666; font-weight: 600; }
        .input-group input {
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px;
        }
        .btn {
            width: 100%; padding: 14px; background: #28a745; color: white; border: none;
            border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn:hover { background: #218838; transform: translateY(-2px); }
        .link { display: block; text-align: center; margin-top: 20px; color: #667eea; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Novo Cadastro</h3>
        <form id="register-form">
            <div class="input-group">
                <label>Usuário</label>
                <input type="text" id="username" required>
            </div>
            <div class="input-group">
                <label>Senha</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn">Criar Minha Conta</button>
        </form>
        <a href="/auth/login-page" class="link">Já possui conta? Entrar</a>
    </div>

    <script>
        document.getElementById('register-form').onsubmit = async (e) => {
            e.preventDefault();
            const response = await fetch('/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                })
            });
            if (response.ok) {
                alert("Conta criada com sucesso!");
                window.location.href = '/auth/login-page';
            } else {
                alert("Erro ao cadastrar. Tente outro usuário.");
            }
        };
    </script>
</body>
</html>
